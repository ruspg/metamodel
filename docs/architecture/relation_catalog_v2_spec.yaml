version: "2.0.0"
status: "wave1-frozen-input"
purpose: "Wave 1 relation catalog for atlas MVP projection, centered on business backbone and minimum cross-layer traversal usefulness"
profiles:
  - atlas_mvp

qualifier_references:
  - id: order_index
    note: "Ordering hint for staged or sequential relations"
  - id: role
    note: "Role of participation in relation context"
  - id: criticality
    note: "Business criticality of edge assertion"
  - id: interaction_type
    note: "How source acts on target (create/read/update/approve/close/validate/etc.)"
  - id: mandatory
    note: "Whether relation is mandatory in process execution"
  - id: payload_role
    note: "Role of entity in an information flow payload"
  - id: sensitivity
    note: "Sensitivity class of transferred information"
  - id: directionality
    note: "Direction semantics for flow usage"
  - id: dependency_type
    note: "Typed dependency semantics"
  - id: condition
    note: "Condition under which relation is active"
  - id: branch_type
    note: "Branching semantics for precedence edges"

