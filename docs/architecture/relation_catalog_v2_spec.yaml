      allowed_in_neighbors: true
      allowed_in_paths: true
      allowed_in_impact: false
      supports_qualifiers: true
      allowed_qualifiers: [order_index]
      required_qualifiers: []
      evidence_required: false
      ui_label_out: contains stage
