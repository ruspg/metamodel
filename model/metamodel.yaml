    данных, процесса, продукта и т.д.) для достижения бизнес-целей, соответствия стандартам качества, нормативным актам или
    техническим спецификациям.
  scope_notes: Может быть применено к различным объектам мета-модели. Должно быть сформулировано измеримо и проверяемо. Может
    иметь приоритет, статус (активно, выполнено, отклонено) и источник (регулятор, бизнес-заказчик, архитектура). Может быть
    связано с метриками.
  aliases:
  - value: требование
    lang: ru
    alias_type: synonym
    status: active
  - value: NFR
    lang: neutral
    alias_type: abbreviation
    status: active
  examples:
  - Время отклика API не должно превышать 200 мс
  - Данные в витрине должны обновляться ежедневно к 08:00
  usage_purpose: Формализовать критерии, которым должен соответствовать объект.
  status: active
  introduced_in: '1.0'
- id: sla
  name: Service Level Agreement
  name_ru: Соглашение об уровне поддержки
  metamodel_level: solution_details
  category: governance
  description: Обязательство по реагированию и разрешению инцидентов, связанных с нарушением требования/ий (или соглашения/ий).
    Формализует ответственность определенной организационной единицы за поддержание объекта в целевом состоянии, соответствующем
    заданным требованиям (соглашениям).
  scope_notes: Привязан к конкретному объекту (дата-продукт, ИТ-система, интеграция и т.д.). Определяет уровни серьезности,
    время реакции и время разрешения. Содержит матрицу эскалации. Связан с метриками, по которым контролируется выполнение
    SLA.
  aliases:
  - value: SLA
    lang: neutral
    alias_type: abbreviation
    status: active
  - value: соглашение об уровне обслуживания
    lang: ru
    alias_type: synonym
    status: active
  examples: []
  usage_purpose: Формализовать ответственность за поддержание объекта в целевом состоянии.
  status: active
  introduced_in: '1.0'
- id: event
  name: Event
  name_ru: Событие
  metamodel_level: null
  category: operational
  description: Факт наступления значимого изменения состояния в рамках бизнес-процесса, работы системы или жизненного цикла
    данных, который фиксируется, имеет временную метку и может служить триггером для других процессов, уведомлений или аналитики.
  scope_notes: Всегда имеет тип события (Business Event, System Event, Data Event), временную метку и источник. Может содержать
    полезную нагрузку (payload). Регистрируется в логах, мониторинговых системах или хабе/шине событий. Используется для автоматического
    реагирования (алерты).
  aliases:
  - value: событие
    lang: ru
    alias_type: synonym
    status: active
  - value: бизнес-событие
    lang: ru
    alias_type: synonym
    status: active
  examples:
  - Заявка переведена в статус Одобрена
  - Пайплайн завершился с ошибкой
  usage_purpose: Фиксировать значимые изменения состояния для триггеров и аналитики.
  status: active
  introduced_in: '1.0'
- id: metric
  name: Metric
  name_ru: Метрика
  metamodel_level: null
  category: operational
  description: Измеримый показатель состояния объекта(ов) данных или процессов, связанных с ним(и). Метрика служит объективной
    основой для мониторинга, контроля и управления объектом.
  scope_notes: 'Индикатор однозначно определен: имеет имя, прямую связь с объектом измерения (дата-объект или дата-процесс),
    дату/период измерения, собственно значение индикатора, единицы измерения. Вычисляется на регулярной основе. Может быть
    интерпретирован: значение индикатора несет понятную смысловую нагрузку. Фиксирует значение по результатам дата-процесса.
    Управляется через DQS / DOA(Metrics) / Other (e.g. DH). Может быть привязана к требованиям (Agreement/Requirement) и SLA.'
