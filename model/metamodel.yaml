    lang: neutral
    alias_type: synonym
    status: active
  - value: индикатор
    lang: ru
    alias_type: synonym
    status: active
  examples:
  - Дата поставки
  - Продолжительность работы ETL-дага
  - Статус DQ проверки
  usage_purpose: Объективно оценивать состояние или эффективность объекта.
  status: active
  introduced_in: '1.0'
