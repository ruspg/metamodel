entity_kinds:
- id: goal
  name: Goal
  name_ru: Цель
  metamodel_level: strategic_view
  category: goal
  description: Будущий результат деятельности банка, отвечающий интересам его акционеров.
  scope_notes: Формулируется по SMART. Допускается иерархия целей.
  aliases:
  - value: цель
    lang: ru
    alias_type: synonym
    status: active
  - value: strategic goal
    lang: en
    alias_type: synonym
    status: active
  - value: business_goal
    lang: neutral
    alias_type: legacy_id
    status: active
  examples:
  - Повысить индекс NPS до 70 к концу года
  usage_purpose: Понимать что должен достичь банк.
  status: active
  introduced_in: '1.0'
- id: job_family
  name: Job Family
  name_ru: Job Family
  metamodel_level: strategic_view
  category: business_structure
  description: Группа ролей/должностей, в рамках которой продаются продукты банка.
  scope_notes: '- Название и смысл задаёт руководитель домена.

    - Список ведётся в отдельном реестре, изменение — только через руководителя домена.

    - Обновление состава Job Family не меняет историю уже созданных сущностей.'
  aliases:
  - value: JF
    lang: neutral
    alias_type: abbreviation
    status: active
  examples: []
  usage_purpose: Группировать продукты по бизнес-направлениям.
  status: active
  introduced_in: '0.1'
  attributes:
  - id: job_family.business_domain_id
    name: Бизнес-домен
    metamodel_level: strategic_view
    description: Домен, в котором оперирует семейство.
- id: bank_product
  name: Product
  name_ru: Продукт
  metamodel_level: strategic_view
  category: offering
  description: Оформленное предложение банка (финансовое или нефинансовое), которое обеспечивает конкретную ценность, удовлетворяет
    определенную потребность и может быть продано конечному клиенту (внешний продукт) или предоставлено внутреннему стейкхолдеру
    (внутренний продукт), обслужено и управляемо в рамках бизнес- и операционной модели банка.
  scope_notes: Продукт является группировкой потоков создания ценностей и характеризуется ими. Продукт = Ценность + "Упаковка"
    для продажи. Ведутся в отдельном реестре (редактируется только PO). Имеет продуктовые метрики. Имеет целевую аудиторию
    (сегменты).
  aliases:
  - value: продукт банка
    lang: ru
    alias_type: synonym
    status: active
  - value: банковский продукт
    lang: ru
    alias_type: synonym
    status: active
  - value: product
    lang: en
    alias_type: synonym
    status: active
  examples:
  - ПотребКредит
  usage_purpose: Понимать что предлагается клиенту и является предметом договора.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: bank_product.description
    name: Описание продукта
    metamodel_level: business_details
    description: Краткое назначение и особенности продукта.
  - id: bank_product.job_family_id
    name: Продуктовое семейство
    metamodel_level: strategic_view
    description: Связь с Job Family, отвечающей за продукт.
  - id: bank_product.value_id
    name: Ценность
    metamodel_level: strategic_view
    description: Какую ценность обеспечивает продукт.
  - id: bank_product.business_owner_id
    name: Бизнес-владелец
    metamodel_level: business_details
    description: Ответственный за развитие и результат продукта.
  - id: bank_product.customer_segment_id
    name: Клиентский сегмент
    metamodel_level: strategic_view
    description: Целевая аудитория, потребители ценности продукта.
- id: organizational_unit
  name: Organisational Unit
  name_ru: Организационная единица
  metamodel_level: strategic_view
  category: business_structure
  description: Формальная структурная часть банка (job family, департамент, отдел, филиал, бизнес- или операционная функция),
    обладающая определенными ролями, ответственностью и ресурсами для выполнения бизнес-функций.
  scope_notes: Является элементом оргструктуры банка. Допускается иерархия.
  aliases:
  - value: оргединица
    lang: ru
    alias_type: abbreviation
    status: active
  - value: подразделение
    lang: ru
    alias_type: synonym
    status: active
  - value: org unit
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - JF Borrow
  usage_purpose: Понимать оргструктуру и ее функциональную ответственность.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: organizational_unit.type
    name: Тип
    metamodel_level: strategic_view
    description: Департамент, управление, команда и т.д.
  - id: organizational_unit.parent_org_unit_id
    name: Родительская единица
    metamodel_level: strategic_view
    description: Иерархия оргструктуры.
  - id: organizational_unit.business_domain_id
    name: Бизнес-домен
    metamodel_level: strategic_view
    description: Домен, за который отвечает единица.
- id: business_domain
  name: Business Domain
  name_ru: Бизнес-домен
  metamodel_level: strategic_view
  category: business_structure
  description: Крупная, стратегически значимая область бизнеса, которая объединяет набор связанных бизнес-способностей, продуктов
    и потоков создания ценности, ориентированных на достижение общих бизнес-целей. Домены представляют собой основные "столпы"
    бизнеса, часто отражающие ключевые направления деятельности или рынки.
  scope_notes: Название должно отражать крупную и устойчивую область бизнеса (существительное). Может быть организован в иерархию
    доменов и поддоменов. Фокусируется на "что" делает бизнес, а не "как" это делается.
  aliases:
  - value: домен
    lang: ru
    alias_type: abbreviation
    status: active
  - value: domain
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - Retail
  - CIB
  - Finance
  - Risk&Compliance
  - Operations
  - HRTech
  - Infrastructure
  usage_purpose: Понимать области бизнеса банка.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: business_domain.criticality
    name: Критичность домена
    metamodel_level: strategic_view
    description: Классификация важности домена для банка (Tier1/Tier2/Tier3 и т.п.).
  - id: business_domain.owning_org_unit_id
    name: Владеющая орг. единица
    metamodel_level: business_details
    description: Кто отвечает за домен.
- id: customer_segment
  name: Customer Segment
  name_ru: Клиентский сегмент
  metamodel_level: strategic_view
  category: stakeholder
  description: Группа потребителей ценности (клиентов, партнеров, внутренних стейкхолдеров), объединенных общими характеристиками,
    потребностями или поведением, в отношении которых банк применяет целенаправленный подход к созданию и доставке ценности.
  scope_notes: Название должно четко идентифицировать группу по демографическим, поведенческим или иным признакам. Сегменты
    могут быть иерархическими (например, "Retail" -> "Premium"). Один потребитель ценности может принадлежать к нескольким
    сегментам.
  aliases:
  - value: сегмент
    lang: ru
    alias_type: abbreviation
    status: active
  - value: segment
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - Retail
  - SME
  - Private
  usage_purpose: Понимать кто является целевой аудиторией продукта.
  status: active
  introduced_in: '1.0'
- id: business_role
  name: Business Role
  name_ru: Бизнес-роль
  metamodel_level: business_details
  category: people
  description: Сотрудник банка, принадлежащий определенной оргединице и обладающий ответственностью и полномочиями для выполнения
    бизнес-функций.
  scope_notes: Может выполняться сотрудником, либо AI-агентом.
  aliases:
  - value: роль
    lang: ru
    alias_type: abbreviation
    status: active
  - value: role
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - CTO
  usage_purpose: Понимать функциональную ответственность ролей.
  status: active
  introduced_in: '1.0'
- id: value
  name: Value Proposition
  name_ru: Ценность
  metamodel_level: strategic_view
  category: value_definition
  description: Полезный и значимый результат, который банк создает для своих клиентов, акционеров, сотрудников или других
    стейкхолдеров через свои продукты, услуги, процессы и взаимодействия, способствуя достижению стратегических целей и устойчивому
    развитию.
  scope_notes: 'Название формируется по правилу: <Бизнес-объект><Законченное действие над объектом>, <пояснение по тому, что
    дает ценность>. Ценности не ведутся в отдельном реестре, а являются частью VS.'
  aliases:
  - value: ценностное предложение
    lang: ru
    alias_type: synonym
    status: active
  - value: value proposition
    lang: en
    alias_type: synonym
    status: active
  - value: VP
    lang: neutral
    alias_type: abbreviation
    status: active
  examples:
  - Кредит получен, Клиент имеет доступ к средствам и может их тратить
  usage_purpose: Понимать какая ценность создается для клиента и потребляется им в JTBD.
  status: active
  introduced_in: '1.0'
- id: value_consumer
  name: Value Consumer
  name_ru: Потребитель ценности
  metamodel_level: business_details
  category: stakeholder
  description: Лицо, группа лиц или организация (внутренний или внешний стейкхолдер), которая получает, использует или извлекает
    выгоду из создаваемой банком ценности через продукты, услуги, процессы или взаимодействия.
  scope_notes: 'Ведутся в отдельном реестре, конечный справочник: Клиент-Заемщик, Клиент-Инвестор, Наследник прав, Банк, Коллектор,
    ГосОрган и т.д.'
  aliases:
  - value: потребитель
    lang: ru
    alias_type: abbreviation
    status: active
  - value: клиент
    lang: ru
    alias_type: synonym
    status: active
  - value: consumer
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - Клиент-Заемщик
  usage_purpose: Понимать для кого создается ценность.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: value_consumer.type
    name: Тип потребителя
    metamodel_level: business_details
    description: Категория получателя ценности (клиент, партнёр, внутренний пользователь).
  - id: value_consumer.channel_id
    name: Канал взаимодействия
    metamodel_level: business_details
    description: Через какой канал потребитель получает ценность.
  - id: value_consumer.value_id
    name: Ценность
    metamodel_level: strategic_view
    description: Какую ценность потребитель ожидает или получает.
  - id: value_consumer.customer_segment_id
    name: Клиентский сегмент
    metamodel_level: strategic_view
    description: Привязка к сегменту, который представляет потребитель.
- id: channel
  name: Channel
  name_ru: Канал
  metamodel_level: business_details
  category: channel
  description: Точка взаимодействия банка с клиентами, партнерами или внутренними пользователями, через которую предоставляются
    продукты, услуги и коммуникации, обеспечивая доступ и обмен информацией.
  scope_notes: Может быть как физическим, так и цифровым.
  aliases:
  - value: канал взаимодействия
    lang: ru
    alias_type: synonym
    status: active
  - value: interaction channel
    lang: en
    alias_type: synonym
    status: active
  examples:
  - ДБО
  usage_purpose: Понимать точки контакта клиентов с продуктами банка.
  status: active
  introduced_in: '1.0'
- id: value_stream
  name: Value Stream
  name_ru: Поток создания ценности
  metamodel_level: business_details
  category: value_delivery
  description: Сквозная последовательность стадий, включающая все этапы, необходимые для предоставления ценности потребителю.
  scope_notes: 'Название — отглагольное существительное. Имеет ценность для потребителя. Имеет законченность: четкий вход
    и выход. Имеет возможность оптимизации (== отсутствие/минимизация зависимости от других цепочек). Имеет критичность, заданную
    руководителем домена (tier). Может давать ценность разным потребителям.'
  aliases:
  - value: VS
    lang: neutral
    alias_type: abbreviation
    status: active
  - value: цепочка создания ценности
    lang: ru
    alias_type: synonym
    status: active
  - value: поток ценности
    lang: ru
    alias_type: search_form
    status: active
  examples:
  - Выдача кредита
  usage_purpose: Понимать как создается ценность E2E, рассчитывать E2E затраты, оптимизировать lead time.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: value_stream.goal
    name: Цель потока
    metamodel_level: business_details
    description: Краткое формулирование результата, который должен получить потребитель.
  - id: value_stream.owner
    name: Ответственный за поток
    metamodel_level: business_details
    description: Роль/должность, ответственная за end-to-end результат.
- id: value_stream_stage
  name: Value Stream Stage
  name_ru: Стадия потока создания ценности
  metamodel_level: business_details
  category: value_delivery
  description: Логически выделенный и управляемый шаг или группа взаимосвязанных действий в потоке создания ценности, который
    преобразует входящие ресурсы, данные или бизнес-объекты в более ценное состояние, приближая процесс к достижению конечного
    результата для потребителя ценности.
  scope_notes: Название — отглагольное существительное. Название отражает область ответственности. Реализуется бизнес-процессом
    самого высокого уровня. Стадии потока не ведутся в отдельном реестре, а являются частью VS. Входным и выходным условием
    является состояние определенных бизнес-сущностей.
  aliases:
  - value: стадия потока
    lang: ru
    alias_type: abbreviation
    status: active
  - value: VS Stage
    lang: en
    alias_type: abbreviation
    status: active
  examples:
  - Андеррайтинг заявки
  usage_purpose: Понимать ответственных и оптимизировать отдельные этапы создания ценности.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: value_stream_stage.value_creation_flow_id
    name: Поток создания ценности
    metamodel_level: business_details
    description: Идентификатор value creation flow, частью которого является стадия.
  - id: value_stream_stage.business_capability_id
    name: Опорная способность
    metamodel_level: strategic_view
    description: Какая бизнес-способность обеспечивает выполнение стадии.
  - id: value_stream_stage.business_process_id
    name: Связанный бизнес-процесс
    metamodel_level: business_details
    description: Процесс, реализующий стадию потока ценности.
- id: business_capability
  name: Business Capability
  name_ru: Бизнес-способность
  metamodel_level: strategic_view
  category: capability
  description: Устойчивая, независимая от оргструктуры и повторяемая способность банка выполнять определенный вид деятельности
    или достигать конкретной бизнес-цели посредством сочетания процессов, людей, технологий и информации.
  scope_notes: Название — существительное с пояснением. Не использовать глаголы — фокус не на действии, а на способности его
    выполнять. Может быть задана иерархия бизнес-способностей. Не зависит от оргструктуры.
  aliases:
  - value: БС
    lang: ru
    alias_type: abbreviation
    status: active
  - value: capability
    lang: en
    alias_type: abbreviation
    status: active
  - value: бизнес-возможность
    lang: ru
    alias_type: synonym
    status: active
  examples:
  - Loan origination
  - Loan disbursement
  usage_purpose: Иметь стратегическое понимание что должен уметь делать банк для реализации своих целей.
  status: active
  introduced_in: '1.0'
  attributes:
  - id: business_capability.maturity_level
    name: Уровень зрелости
